// CDN globals
const { useState, useEffect } = React;
const { ShoppingCart, User, X, Trash2, Search, Heart, Star, Truck, Package, ChevronLeft, ChevronRight, Mail, Phone, Upload, ArrowLeft, MapPin, CreditCard, Check, Layers, Menu, Tag, Filter, Edit2, Plus, AlertCircle } = LucideReact;


// ── Module-level utility ─────────────────────────────────────────────────────
const handleFileUpload = (file, callback) => {
  if (file?.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (e) => callback(e.target.result);
    reader.readAsDataURL(file);
  }
};

// ── Defined OUTSIDE ArtemisPrime so it never remounts on outer state changes ──
function DragDropUploader({ onUpload, multiple, preview, label }) {
  const [isDragging, setIsDragging] = React.useState(false);
  const fileInputRef = React.useRef(null);

  return (
    <div>
      <div
        onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
        onDragLeave={() => setIsDragging(false)}
        onDrop={(e) => {
          e.preventDefault();
          setIsDragging(false);
          const files = Array.from(e.dataTransfer.files);
          if (multiple) files.forEach(f => handleFileUpload(f, onUpload));
          else handleFileUpload(files[0], onUpload);
        }}
        onClick={() => fileInputRef.current?.click()}
        className={`border-2 border-dashed rounded-lg p-8 text-center cursor-pointer transition ${isDragging ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-gray-300 bg-gray-50 dark:bg-[#323232] dark:border-gray-600'}`}
      >
        <Upload className="mx-auto mb-2 text-gray-400" size={32} />
        <p className="text-sm text-gray-600 dark:text-gray-300">{label}</p>
        <p className="text-xs text-gray-400 mt-1">Click or drag files here</p>
        <input
          ref={fileInputRef}
          type="file"
          accept="image/*"
          multiple={multiple}
          className="hidden"
          onChange={(e) => {
            const files = Array.from(e.target.files);
            if (multiple) files.forEach(f => handleFileUpload(f, onUpload));
            else handleFileUpload(files[0], onUpload);
            e.target.value = ''; // reset so same file can be uploaded again
          }}
        />
      </div>
      {preview && <div className="mt-3">{preview}</div>}
    </div>
  );
}

function TransactionForm({ darkMode, onConfirm }) {
  const [txnId, setTxnId] = useState('');
  const [phone, setPhone] = useState('');
  const [error, setError] = useState('');

  const handleSubmit = () => {
    setError('');
    if (!txnId.trim() || txnId.trim().length < 6) {
      setError('Please enter a valid Transaction ID (at least 6 characters)');
      return;
    }
    if (phone.length !== 4) {
      setError('Please enter the last 4 digits of your phone number');
      return;
    }
    onConfirm(txnId.trim(), phone);
    // Inputs only clear after successful submission
    setTxnId('');
    setPhone('');
  };

  const inputClass = `border rounded-lg px-4 py-3 w-full ${darkMode ? 'border-gray-600 bg-gray-800 text-white' : 'border-gray-300 bg-white text-black'}`;

  return (
    <div className="space-y-4">
      {error && (
        <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
          {error}
        </div>
      )}
      <div>
        <label className="block text-xs font-semibold mb-1 text-gray-600">
          UPI Transaction / Reference ID *
        </label>
        <input
          type="text"
          placeholder="e.g. 403812345678"
          value={txnId}
          onChange={(e) => setTxnId(e.target.value)}
          className={inputClass}
        />
      </div>
      <div>
        <label className="block text-xs font-semibold mb-1 text-gray-600">
          Last 4 digits of paying phone number *
        </label>
        <input
          type="text"
          placeholder="e.g. 4321"
          maxLength={4}
          value={phone}
          onChange={(e) => setPhone(e.target.value.replace(/\D/g, ''))}
          className={inputClass}
        />
      </div>
      <button
        onClick={handleSubmit}
        className="w-full bg-black text-white py-4 rounded-lg font-semibold hover:bg-gray-800 transition"
      >
        ✅ Confirm Order
      </button>
    </div>
  );
}


// Stable top-level component so it never remounts on parent re-render
function CollabInput({ value, onChange, onBlur, className, placeholder }) {
  return (
    <input
      className={className}
      placeholder={placeholder}
      value={value}
      onChange={onChange}
      onBlur={onBlur}
    />
  );
}


const MemoCollectionPagesAdmin = React.memo(function CollectionPagesAdmin({ syncCollectionPages, catalogItems, products }) {
  const [editingCol, setEditingCol] = React.useState(null);
  const [collabDraft, setCollabDraft] = React.useState({});
  const [pages, setPages] = React.useState({});
  const [deletingBanner, setDeletingBanner] = React.useState(null); // {col, id}

  // Load once on mount
  React.useEffect(() => {
    (async () => {
      try {
        const meta = JSON.parse(localStorage.getItem('collectionPagesMeta') || '{}');
        for (const col of Object.keys(meta)) {
          const banners = meta[col].banners || [];
          for (let i = 0; i < banners.length; i++) {
            try { const r = await window.storage.get('colbanner-' + banners[i].id); if (r) banners[i].image = r.value; } catch(e) {}
          }
          meta[col].banners = banners;
        }
        setPages(meta);
      } catch(e) {}
    })();
  }, []);

  const savePages = (updater) => {
    setPages(prev => {
      const updated = typeof updater === 'function' ? updater(prev) : updater;
      const forStorage = {};
      Object.keys(updated).forEach(k => {
        forStorage[k] = { ...updated[k], banners: (updated[k].banners||[]).map(b => ({ id: b.id, productId: b.productId })) };
      });
      try { localStorage.setItem('collectionPagesMeta', JSON.stringify(forStorage)); } catch(e) {}
      // Sync to parent via timeout so it doesn't trigger immediate remount
      if (syncCollectionPages) setTimeout(() => syncCollectionPages(updated), 0);
      // Sync collection pages to Supabase
      if (isSupabaseConfigured()) {
        Object.keys(updated).forEach(col => {
          const pg = updated[col];
          const bannersMeta = (pg.banners || []).map(b => ({ id: b.id, productId: b.productId }));
          db.upsertCollectionPage({ collection_name: col, banners: bannersMeta, collab_text: pg.collabText || '' })
            .catch(e => console.warn('collection page sync failed', e));
        });
      }
      return updated;
    });
  };

  const allCols = Array.from(new Set([...catalogItems.map(c => c.name), ...products.map(p => p.collection).filter(Boolean)]));
  const inp = 'border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 text-sm w-full dark:bg-[#3a3a3a] focus:outline-none focus:ring-2 focus:ring-black';

  return (
    <div>
      <div className="mb-6">
        <h2 className="text-xl font-bold">Collection Pages</h2>
        <p className="text-sm text-gray-500 mt-1">Add banners and a collab name to each collection page.</p>
      </div>
      {allCols.length === 0 ? (
        <div className="text-center py-20 border rounded-xl text-gray-400">
          <p className="font-medium">No collections yet</p>
          <p className="text-sm mt-1">Create collections in the Catalog tab first</p>
        </div>
      ) : (
        <div className="space-y-4">
          {allCols.map(col => {
            const pg = pages[col] || { banners: [], collabText: '' };
            const isOpen = editingCol === col;
            return (
              <div key={col} className="border dark:border-gray-700 rounded-xl bg-white dark:bg-[#323232] overflow-hidden">
                <div className="flex items-center justify-between px-6 py-4 cursor-pointer" onClick={() => setEditingCol(isOpen ? null : col)}>
                  <div>
                    <p className="font-semibold capitalize">{col}</p>
                    <p className="text-xs text-gray-400 mt-0.5">{pg.banners?.length || 0} banners{pg.collabText ? ` · × ${pg.collabText}` : ''}</p>
                  </div>
                  <ChevronRight size={16} className={`text-gray-400 transition-transform ${isOpen ? 'rotate-90' : ''}`} />
                </div>
                {isOpen && (
                  <div className="px-6 pb-6 border-t dark:border-gray-700 pt-5 space-y-5">
                    <div>
                      <label className="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Collaboration / Sub-brand <span className="font-normal">(optional)</span></label>
                      <div className="flex gap-2">
                        <input
                          className={inp}
                          placeholder="e.g. Nike, Supreme, Local Artist..."
                          value={collabDraft[col] !== undefined ? collabDraft[col] : (pg.collabText || '')}
                          onChange={e => setCollabDraft(prev => ({...prev, [col]: e.target.value}))}
                        />
                        <button
                          onClick={() => {
                            const val = collabDraft[col] !== undefined ? collabDraft[col] : (pg.collabText || '');
                            const updated = { ...pages, [col]: { ...(pg), collabText: val } };
                            savePages(updated);
                          }}
                          className="px-4 py-2 bg-black text-white text-sm font-semibold rounded-lg hover:bg-gray-800 transition whitespace-nowrap"
                        >OK</button>
                      </div>
                      {pg.collabText && <p className="text-xs text-green-600 mt-1">Saved: × {pg.collabText}</p>}
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Banners <span className="font-normal text-gray-400">(1920 × 500px recommended)</span></label>
                      <DragDropUploader
                        label="Upload banner images"
                        multiple={true}
                        onUpload={(url) => {
                          const id = 'banner-' + Date.now();
                          const colName = col; // capture col at render time
                          const newBanner = { id, image: url, productId: null };
                          // Save image to window.storage async, but update UI immediately
                          savePages(prev => {
                            const c = prev[colName] || { banners: [], collabText: '' };
                            return { ...prev, [colName]: { ...c, banners: [...(c.banners || []), newBanner] } };
                          });
                          window.storage.set('colbanner-' + id, url).catch(e => console.warn('banner save failed', e));
                        }}
                      />
                      {(pg.banners || []).length > 0 && (
                        <div className="mt-3 space-y-3">
                          {pg.banners.map((b, idx) => {
                            const colProducts = products.filter(p => p.collection === col);
                            return (
                              <div key={b.id} className="border dark:border-gray-700 rounded-xl p-3 bg-gray-50 dark:bg-[#2a2a2a]">
                                <div className="flex items-center gap-3 mb-2">
                                  <img src={b.image} className="w-20 h-12 object-cover rounded-lg" alt="" />
                                  <span className="text-sm font-medium flex-1">Banner {idx + 1}</span>
                                  {deletingBanner && deletingBanner.col === col && deletingBanner.id === b.id ? (
                                    <div className="flex flex-col items-end gap-2 shrink-0">
                                      <p className="text-xs text-red-600 font-semibold">Delete Banner {idx + 1}?</p>
                                      <div className="flex gap-2">
                                        <button onClick={() => setDeletingBanner(null)}
                                          className="text-xs px-3 py-1.5 border dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-[#3a3a3a] transition">
                                          Cancel
                                        </button>
                                        <button onClick={() => {
                                          const bid = b.id;
                                          try { window.storage.delete('colbanner-' + bid); } catch(e) {}
                                          savePages(prev => {
                                            const c = prev[col] || { banners: [], collabText: '' };
                                            return { ...prev, [col]: { ...c, banners: c.banners.filter(x => x.id !== bid) } };
                                          });
                                          setDeletingBanner(null);
                                        }} className="text-xs px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white rounded-lg transition">
                                          Delete
                                        </button>
                                      </div>
                                    </div>
                                  ) : (
                                    <button onClick={() => setDeletingBanner({col, id: b.id})}
                                      className="text-red-500 hover:text-red-700 px-3 py-2 rounded hover:bg-red-50 dark:hover:bg-red-900/20 shrink-0">
                                      <Trash2 size={20} />
                                    </button>
                                  )}
                                </div>
                                <div>
                                  <label className="block text-xs text-gray-400 mb-1">Links to product (optional)</label>
                                  <select
                                    className="border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 text-sm w-full dark:bg-[#3a3a3a]"
                                    value={b.productId || ''}
                                    onChange={e => {
                                      const bid = b.id, val = e.target.value || null;
                                      savePages(prev => {
                                        const c = prev[col] || { banners: [], collabText: '' };
                                        return { ...prev, [col]: { ...c, banners: c.banners.map(x => x.id === bid ? {...x, productId: val} : x) } };
                                      });
                                    }}
                                  >
                                    <option value="">No link</option>
                                    {colProducts.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                  </select>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


);


const ProductsList = React.memo(function ProductsList({ products, setProducts, darkMode }) {

        <div className="space-y-3">

              <img src={p.images[0]} alt="" className="w-24 h-24 object-cover rounded" />
              <div className="flex-1">
                <h4 className="font-bold text-lg">{p.name}</h4>
                <p className="text-sm text-gray-600 dark:text-gray-400">Collection: {p.collection} • Theme: {p.theme}</p>
                <p className="text-sm text-gray-600 dark:text-gray-400">{p.images.length} images • Stock: {p.stock}</p>
                <p className="font-bold text-lg mt-1">₹{p.price}</p>
              </div>
              {deleteProductId === p.id ? (
                <div className="flex flex-col items-end gap-2 shrink-0">
                  <p className="text-xs text-red-600 font-semibold whitespace-nowrap">Delete "{p.name}"?</p>
                  <div className="flex gap-2">
                    <button onClick={() => setDeleteProductId(null)}
                      className="text-xs px-3 py-1.5 border dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-[#3a3a3a] transition">
                      Cancel
                    </button>
                    <button onClick={() => {
                      const pid = p.id;
                      const toDelete = products.find(pr => pr.id === pid);
                      if (toDelete) {
                        (toDelete.images||[]).forEach((_,i) => window.storage.delete(`prod-${pid}-img-${i}`).catch(()=>{}));
                        window.storage.delete(`prod-${pid}-banner`).catch(()=>{});
                      }
                      setProducts(prev => {
                        const updated = prev.filter(pr => pr.id !== pid);
                        if (isSupabaseConfigured()) {
                          db.deleteProduct(pid).catch(e => console.warn('product delete failed', e));
                        } else {
                          const meta = updated.map(p => { const {images,productBanner,...rest} = p; return {...rest, imageKeys:(images||[]).map((_,i)=>`prod-${p.id}-img-${i}`), hasBanner:!!productBanner}; });
                          try { localStorage.setItem('products', JSON.stringify(meta)); } catch(e) {}
                        }
                        return updated;
                      });
                      setDeleteProductId(null);
                    }} className="text-xs px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white rounded-lg transition">
                      Delete
                    </button>
                  </div>
                </div>
              ) : (
                <button onClick={() => setDeleteProductId(p.id)}
                  className="text-red-500 hover:text-red-700 px-4 py-2 rounded hover:bg-red-50 dark:hover:bg-red-900/20 h-fit shrink-0">
                  <Trash2 size={20} />
                </button>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
});



// ── Supabase config — paste your URL and anon key from supabase.com/dashboard ──
const SUPABASE_URL = localStorage.getItem('sb_url') || '';
const SUPABASE_ANON_KEY = localStorage.getItem('sb_key') || '';

const sbFetch = async (path, opts = {}) => {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...opts,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) { console.warn('Supabase error:', res.status, await res.text()); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

const db = {
  // Products
  getProducts: () => sbFetch('/products?order=created_at.asc'),
  upsertProduct: (p) => sbFetch('/products', { method: 'POST', prefer: 'resolution=merge-duplicates,return=representation', body: JSON.stringify(p) }),
  deleteProduct: (id) => sbFetch(`/products?id=eq.${id}`, { method: 'DELETE', prefer: '' }),

  // Orders
  getOrders: () => sbFetch('/orders?order=created_at.desc'),
  insertOrder: (o) => sbFetch('/orders', { method: 'POST', body: JSON.stringify(o) }),
  updateOrder: (id, patch) => sbFetch(`/orders?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(patch) }),
  deleteOrder: (id) => sbFetch(`/orders?id=eq.${id}`, { method: 'DELETE', prefer: '' }),

  // Payment proofs
  getProofs: () => sbFetch('/payment_proofs?order=created_at.desc'),
  insertProof: (p) => sbFetch('/payment_proofs', { method: 'POST', body: JSON.stringify(p) }),
  updateProof: (id, patch) => sbFetch(`/payment_proofs?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(patch) }),

  // Contacts
  getContacts: () => sbFetch('/contacts?order=created_at.desc'),
  insertContact: (c) => sbFetch('/contacts', { method: 'POST', body: JSON.stringify(c) }),

  // Slideshow
  getSlideshow: () => sbFetch('/slideshow?order=position.asc'),
  upsertSlide: (s) => sbFetch('/slideshow', { method: 'POST', prefer: 'resolution=merge-duplicates,return=representation', body: JSON.stringify(s) }),
  deleteSlide: (id) => sbFetch(`/slideshow?id=eq.${id}`, { method: 'DELETE', prefer: '' }),

  // Catalog items
  getCatalog: () => sbFetch('/catalog_items?order=name.asc'),
  upsertCatalog: (c) => sbFetch('/catalog_items', { method: 'POST', prefer: 'resolution=merge-duplicates,return=representation', body: JSON.stringify(c) }),
  deleteCatalog: (id) => sbFetch(`/catalog_items?id=eq.${id}`, { method: 'DELETE', prefer: '' }),

  // Collection pages
  getCollectionPages: () => sbFetch('/collection_pages'),
  upsertCollectionPage: (p) => sbFetch('/collection_pages', { method: 'POST', prefer: 'resolution=merge-duplicates,return=representation', body: JSON.stringify(p) }),

  // Site settings (single row, id=1)
  getSettings: () => sbFetch('/site_settings?id=eq.1').then(r => r?.[0] || null),
  upsertSettings: (s) => sbFetch('/site_settings', { method: 'POST', prefer: 'resolution=merge-duplicates,return=representation', body: JSON.stringify({ id: 1, ...s }) }),
};

const isSupabaseConfigured = () => !!(localStorage.getItem('sb_url') && localStorage.getItem('sb_key'));


const hashPassword = (str) => {
  let hash = 5381;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) + hash) ^ str.charCodeAt(i);
    hash = hash & 0x7fffffff;
  }
  return hash.toString(36);
};

const generateOrderId = () => {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const seg1 = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  const seg2 = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  return 'AP-' + seg1 + '-' + seg2;
};

export default function ArtemisPrime() {
  const [currentPage, setCurrentPage] = useState('home');
  const [cart, setCart] = useState([]);
  const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem('currentUser') || 'null'); } catch { return null; } });
  const [showCart, setShowCart] = useState(false);
  const [products, setProducts] = useState([]);
  const [slideshow, setSlideshow] = useState([]);
  const [currentSlide, setCurrentSlide] = useState(0);
  const [touchStartX, setTouchStartX] = useState(null);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [selectedSize, setSelectedSize] = useState('M');
  const [selectedImage, setSelectedImage] = useState(0);
  const [quantity, setQuantity] = useState(1);
  const [darkMode, setDarkMode] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [showSearch, setShowSearch] = useState(false);
  const [wishlist, setWishlist] = useState([]);
  const [showAuthModal, setShowAuthModal] = useState(false);
  const [showAdminSetup, setShowAdminSetup] = useState(() => !localStorage.getItem('adminCreds'));
  const [adminSetupForm, setAdminSetupForm] = useState({ email: '', password: '', confirm: '', error: '' });
  const [authMode, setAuthMode] = useState('login');
  const [showThemePanel, setShowThemePanel] = useState(false);
  const [checkoutStep, setCheckoutStep] = useState(1);
  const [orders, setOrders] = useState(() => { try { return JSON.parse(localStorage.getItem('orders') || '[]'); } catch { return []; } });
  const [adminView, setAdminView] = useState('products');
  const [contacts, setContacts] = useState(() => { try { return JSON.parse(localStorage.getItem('contacts') || '[]'); } catch { return []; } });
  const [paymentProofs, setPaymentProofs] = useState(() => {
    try {
      const raw = JSON.parse(localStorage.getItem('paymentProofs') || '[]');
      // Deduplicate - keep only the last proof per orderId
      const seen = new Set();
      return [...raw].reverse().filter(p => { if (seen.has(p.id)) return false; seen.add(p.id); return true; }).reverse();
    } catch { return []; }
  });
  const [selectedProof, setSelectedProof] = useState(null);
  const [selectedContact, setSelectedContact] = useState(null);

  const UPIPaymentCard = ({ upiId, amount, storeName, orderId }) => {

    const [copied, setCopied] = React.useState('');

    const upiLink = upiId && amount > 0

      : null;

      if (!upiId) { setQrError('UPI ID not configured. Go to Admin → Settings.'); return; }
      if (!amount || amount <= 0) { setQrError('Cart total is 0.'); return; }
      if (!qrDivRef.current) return;

      const render = () => {
        try {
          // Clear previous QR if any
          qrDivRef.current.innerHTML = '';
          // qrcodejs API: new QRCode(element, { text, width, height })
          new window.QRCode(qrDivRef.current, {
            text: upiLink,
            width: 220,
            height: 220,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: window.QRCode.CorrectLevel.M
          });
          setQrReady(true);
          setQrError('');
        } catch (e) {
          setQrError('QR generation failed. Use UPI ID below.');
        }
      };

      if (window.QRCode) {
        render();
      } else {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
        script.onload = render;
        script.onerror = () => setQrError('Could not load QR library. Use UPI ID below.');
        document.head.appendChild(script);
      }
    }, [upiLink]);

    const copyText = (text, label) => {
      navigator.clipboard.writeText(text).then(() => {
        setCopied(label);
        setTimeout(() => setCopied(''), 2000);
      });
    };

    return (
      <div className="space-y-4 mb-6">
        {/* Amount */}
        <div className="border dark:border-gray-700 rounded-xl p-5 text-center bg-white dark:bg-[#323232]">

          <p className="text-xs text-gray-400 mt-1">Order #{orderId}</p>
        </div>

        {/* QR Code Card */}
        <div className="border-2 border-purple-200 dark:border-purple-800 rounded-xl p-6 text-center bg-white dark:bg-[#323232]">
          <p className="text-sm font-semibold mb-4 text-gray-700 dark:text-gray-300">
            📱 Scan with any UPI app — amount auto-filled
          </p>

          {qrError ? (
            <div className="w-56 h-56 mx-auto flex flex-col items-center justify-center bg-red-50 dark:bg-red-900/20 rounded-xl border-2 border-dashed border-red-300 dark:border-red-700 p-4">
              <p className="text-red-600 dark:text-red-400 text-sm font-semibold text-center">{qrError}</p>
            </div>
          ) : (
            <div className="relative inline-block">
              <div className="bg-white p-3 rounded-xl border-2 border-gray-200 inline-block shadow-sm">
                <div ref={qrDivRef} className="rounded" />
              </div>
              {!qrReady && (
                <div className="absolute inset-0 flex items-center justify-center bg-white/80 rounded-xl">
                  <p className="text-xs text-gray-400 animate-pulse">Generating QR...</p>
                </div>
              )}
            </div>
          )}

          {/* UPI ID display */}
          <div className="mt-4 bg-gray-50 dark:bg-[#3a3a3a] rounded-lg p-3">
            <p className="text-xs text-gray-500 mb-1">UPI ID</p>
            <p className="font-mono font-bold text-purple-700 dark:text-purple-300 break-all">{upiId}</p>
          </div>

          {/* Copy buttons */}
          <div className="grid grid-cols-2 gap-3 mt-4">
            <button
              onClick={() => copyText(upiId, 'upiid')}

            >

            </button>
          </div>
        </div>

                      <input className={inp} placeholder="Full Name *" value={addForm.name} onChange={e => setAddForm(f=>({...f,name:e.target.value}))} />
                      <input className={inp} placeholder="Email" type="email" value={addForm.email} onChange={e => setAddForm(f=>({...f,email:e.target.value}))} />
                      <input className={inp} placeholder="Phone" value={addForm.phone} onChange={e => setAddForm(f=>({...f,phone:e.target.value}))} />
                      <select className={inp} value={addForm.source} onChange={e => setAddForm(f=>({...f,source:e.target.value}))}>
                        <option>Website</option>
                        <option>Instagram</option>
                        <option>WhatsApp</option>
                        <option>Phone</option>
                        <option>Other</option>
                      </select>
                    </div>
                    <div className="space-y-3">
                      <p className="text-xs font-bold uppercase tracking-widest text-gray-400">Shipping</p>
                      <input className={inp} placeholder="Address" value={addForm.address} onChange={e => setAddForm(f=>({...f,address:e.target.value}))} />
                      <div className="grid grid-cols-2 gap-2">
                        <input className={inp} placeholder="City" value={addForm.city} onChange={e => setAddForm(f=>({...f,city:e.target.value}))} />
                        <input className={inp} placeholder="State" value={addForm.state} onChange={e => setAddForm(f=>({...f,state:e.target.value}))} />
                      </div>
                      <input className={inp} placeholder="PIN Code" value={addForm.pincode} onChange={e => setAddForm(f=>({...f,pincode:e.target.value}))} />
                    </div>
                    <div className="space-y-3">
                      <p className="text-xs font-bold uppercase tracking-widest text-gray-400">Items *</p>
                      <textarea className={inp} placeholder={"One item per line\ne.g. Dank Memes Tee - Size L"} rows={4} value={addForm.items} onChange={e => setAddForm(f=>({...f,items:e.target.value}))} />
                    </div>
                    <div className="space-y-3">
                      <p className="text-xs font-bold uppercase tracking-widest text-gray-400">Order Details</p>
                      <input className={inp} placeholder="Total Amount (₹) *" type="number" value={addForm.total} onChange={e => setAddForm(f=>({...f,total:e.target.value}))} />
                      <textarea className={inp} placeholder="Internal notes (optional)" rows={3} value={addForm.notes} onChange={e => setAddForm(f=>({...f,notes:e.target.value}))} />
                    </div>
                  </div>
                  <div className="flex gap-3 mt-5">
                    <button
                      onClick={submitManualOrder}
                      disabled={!addForm.name.trim() || !addForm.items.trim() || !addForm.total}
                      className="bg-black text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-gray-800 transition disabled:opacity-40 disabled:cursor-not-allowed"
                    >
                      Add Order
                    </button>
                    <button onClick={() => { setShowAddOrder(false); setAddForm(emptyForm); }} className="px-6 py-2.5 rounded-lg text-sm border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-[#3a3a3a] transition">
                      Cancel
                    </button>
                  </div>
                </div>
              )}

              {/* Tab switcher */}
              <div className="flex items-center gap-6 mb-6 border-b dark:border-gray-700">
                <button
                  onClick={() => setOrdersTab('processing')}
                  className={`pb-3 text-sm font-semibold border-b-2 transition ${ordersTab === 'processing' ? 'border-black dark:border-white text-black dark:text-white' : 'border-transparent text-gray-400 hover:text-gray-600'}`}
                >
                  Processing
                  {processingOrders.length > 0 && (
                    <span className="ml-2 text-xs font-bold px-2 py-0.5 rounded-full" style={{backgroundColor:'#f59e0b',color:'#000'}}>{processingOrders.length}</span>
                  )}
                </button>
                <button
                  onClick={() => setOrdersTab('processed')}
                  className={`pb-3 text-sm font-semibold border-b-2 transition ${ordersTab === 'processed' ? 'border-black dark:border-white text-black dark:text-white' : 'border-transparent text-gray-400 hover:text-gray-600'}`}
                >
                  Processed
                  {processedOrders.length > 0 && (
                    <span className="ml-2 text-xs font-bold px-2 py-0.5 rounded-full" style={{backgroundColor:'#22c55e',color:'#000'}}>{processedOrders.length}</span>
                  )}
                </button>
              </div>

              {/* Order list */}
              <div className="space-y-4">
                {(ordersTab === 'processing' ? processingOrders : processedOrders).length === 0 ? (
                  <div className="text-center py-20 text-gray-400 border rounded-xl dark:border-gray-700">
                    <Package size={40} className="mx-auto mb-3 text-gray-300" />
                    <p className="font-medium mb-1">{ordersTab === 'processing' ? 'No orders in progress' : 'No delivered orders yet'}</p>
                    {ordersTab === 'processing' && <p className="text-sm">Hit <strong>Add Order</strong> above to log one manually</p>}
                  </div>
                ) : (() => {
                  const list = (ordersTab === 'processing' ? processingOrders : processedOrders).slice().reverse();
                  const sorted = highlightOrderId
                    ? [...list.filter(o => o.id === highlightOrderId), ...list.filter(o => o.id !== highlightOrderId)]
                    : list;
                  return sorted.map(order => renderOrderCard(order));
                })()}
              </div>
            </div>
          );
        })()}

        {/* ── CATALOG ITEMS ADMIN ── */}
        {adminView === 'catalog' && (() => {
          const CatalogAdmin = () => {
            const [items, setItems] = React.useState(catalogItems); // local copy ok - not a hook issue
            const sortKey = catalogSortKey; const setSortKey = setCatalogSortKey;
            const sortDir = catalogSortDir; const setSortDir = setCatalogSortDir;
            const page = catalogPage; const setPage = setCatalogPage;
            const modal = catalogModal; const setModal = setCatalogModal;
            const deleteTarget = catalogDeleteTarget; const setDeleteTarget = setCatalogDeleteTarget;
            const toast = catalogToast; const setToast = setCatalogToast;
            const formData = catalogFormData; const setFormData = setCatalogFormData;
            const formErrors = catalogFormErrors; const setFormErrors = setCatalogFormErrors;
            const PER_PAGE = 8;

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

            const sorted = [...items].sort((a,b) => {
              const av = (a[sortKey]||'').toLowerCase(), bv = (b[sortKey]||'').toLowerCase();
              return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
            });
            const paginated = sorted.slice((page-1)*PER_PAGE, page*PER_PAGE);
            const totalPages = Math.ceil(items.length / PER_PAGE);

            const toggleSort = (key) => {
              if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
              else { setSortKey(key); setSortDir('asc'); }
            };

            const validate = (data) => {
              const errs = {};
              if (!data.name.trim()) errs.name = 'Collection name is required';
              else if (data.name.trim().length < 2) errs.name = 'Must be at least 2 characters';
              else if (modal !== 'create' && data.name.trim() !== modal.name && items.find(i => i.name.toLowerCase() === data.name.trim().toLowerCase()))
                errs.name = 'A collection with this name already exists';
              else if (modal === 'create' && items.find(i => i.name.toLowerCase() === data.name.trim().toLowerCase()))
                errs.name = 'A collection with this name already exists';
              return errs;
            };

            const openCreate = () => { setFormData({name:'',description:'',icon:'👗'}); setFormErrors({}); setModal('create'); };
            const openEdit = (item) => { setFormData({name:item.name,description:item.description||'',icon:item.icon||'👗'}); setFormErrors({}); setModal(item); };

            const handleSave = () => {
              const errs = validate(formData);
              if (Object.keys(errs).length) { setFormErrors(errs); return; }
              let updated;
              if (modal === 'create') {
                updated = [...items, {id: Date.now().toString(), ...formData, name: formData.name.trim(), createdAt: new Date().toISOString()}];
                showToast('✅ Collection created');
              } else {
                updated = items.map(i => i.id === modal.id ? {...i, ...formData, name: formData.name.trim()} : i);
                showToast('✅ Collection updated');
              }
              setItems(updated);
              setCatalogItems(updated);
              setModal(null);
            };

            const handleDelete = () => {
              const updated = items.filter(i => i.id !== deleteTarget.id);
              setItems(updated);
              setCatalogItems(updated);
              setDeleteTarget(null);
              showToast('🗑️ Collection deleted');
            };

            const SortIcon = ({col}) => (
              <span className="ml-1 text-gray-400">{sortKey===col ? (sortDir==='asc'?'↑':'↓') : '↕'}</span>
            );

            return (
              <div className="bg-white dark:bg-[#323232] border dark:border-gray-700 rounded-xl overflow-hidden">
                {/* Table header */}
                <div className="flex items-center justify-between px-6 py-4 border-b dark:border-gray-700">
                  <div>
                    <h3 className="font-bold text-lg">Catalog Collections</h3>
                    <p className="text-xs text-gray-500 mt-0.5">Manage the sidebar navigation items. These group your products into collections.</p>
                  </div>
                  <button onClick={openCreate}
                    className="flex items-center gap-2 bg-black dark:bg-white dark:text-black text-white text-sm px-4 py-2 rounded-lg hover:bg-gray-800 dark:hover:bg-gray-100 transition">
                    <Plus size={15} /> New Collection
                  </button>
                </div>

                {/* Data table */}
                {items.length === 0 ? (
                  <div className="flex flex-col items-center justify-center py-16 text-center px-4">
                    <Layers size={40} className="text-gray-300 mb-3" />
                    <p className="font-semibold text-gray-500 mb-1">No collections yet</p>
                    <p className="text-sm text-gray-400 mb-4">Collections appear as sidebar navigation items on the homepage</p>
                    <button onClick={openCreate} className="flex items-center gap-2 bg-black text-white text-sm px-4 py-2 rounded-lg hover:bg-gray-800">
                      <Plus size={14} /> Create first collection
                    </button>
                  </div>
                ) : (
                  <>
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="bg-gray-50 dark:bg-[#3a3a3a]/50 text-left">
                          <th className="px-6 py-3 font-semibold text-xs uppercase tracking-wider text-gray-500 cursor-pointer select-none" onClick={() => toggleSort('name')}>
                            Name <SortIcon col="name"/>
                          </th>
                          <th className="px-6 py-3 font-semibold text-xs uppercase tracking-wider text-gray-500 hidden md:table-cell cursor-pointer select-none" onClick={() => toggleSort('description')}>
                            Description <SortIcon col="description"/>
                          </th>
                          <th className="px-6 py-3 font-semibold text-xs uppercase tracking-wider text-gray-500 text-center">Products</th>
                          <th className="px-6 py-3 font-semibold text-xs uppercase tracking-wider text-gray-500 text-right">Actions</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                        {paginated.map(item => (
                          <tr key={item.id} className="hover:bg-gray-50 dark:hover:bg-[#3a3a3a]/30 transition-colors">
                            <td className="px-6 py-4">
                              <div className="flex items-center gap-2">
                                <span className="text-lg">{item.icon || '📁'}</span>
                                <span className="font-medium capitalize">{item.name}</span>
                              </div>
                            </td>
                            <td className="px-6 py-4 text-gray-500 hidden md:table-cell max-w-xs truncate">
                              {item.description || <span className="text-gray-300 italic">No description</span>}
                            </td>
                            <td className="px-6 py-4 text-center">
                              <span className="bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 text-xs font-semibold px-2 py-1 rounded-full">
                                {products.filter(p => p.collection === item.name).length}
                              </span>
                            </td>
                            <td className="px-6 py-4">
                              <div className="flex items-center justify-end gap-2">
                                <button onClick={() => openEdit(item)}
                                  className="p-1.5 hover:bg-gray-100 dark:hover:bg-[#3a3a3a] rounded-lg text-gray-500 hover:text-gray-800 dark:hover:text-white transition" title="Edit">
                                  <Edit2 size={15} />
                                </button>
                                <button onClick={() => setDeleteTarget(item)}
                                  className="p-1.5 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-gray-400 hover:text-red-600 transition" title="Delete">
                                  <Trash2 size={15} />
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>

                    {/* Pagination */}
                    {totalPages > 1 && (
                      <div className="flex items-center justify-between px-6 py-3 border-t dark:border-gray-700 text-sm">
                        <span className="text-gray-500 text-xs">{items.length} collections · Page {page} of {totalPages}</span>
                        <div className="flex gap-1">
                          <button onClick={() => setPage(p => Math.max(1,p-1))} disabled={page===1}
                            className="px-3 py-1 rounded border dark:border-gray-600 disabled:opacity-40 hover:bg-gray-50 dark:hover:bg-[#3a3a3a] transition">
                            ‹
                          </button>
                          {[...Array(totalPages)].map((_,i) => (
                            <button key={i} onClick={() => setPage(i+1)}
                              className={`px-3 py-1 rounded border dark:border-gray-600 transition ${page===i+1 ? 'bg-black text-white dark:bg-white dark:text-black border-black' : 'hover:bg-gray-50 dark:hover:bg-[#3a3a3a]'}`}>
                              {i+1}
                            </button>
                          ))}
                          <button onClick={() => setPage(p => Math.min(totalPages,p+1))} disabled={page===totalPages}
                            className="px-3 py-1 rounded border dark:border-gray-600 disabled:opacity-40 hover:bg-gray-50 dark:hover:bg-[#3a3a3a] transition">
                            ›
                          </button>
                        </div>
                      </div>
                    )}
                  </>
                )}

                {/* ── CREATE/EDIT MODAL ── */}
                {modal !== null && (
                  <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setModal(null)}>
                    <div className="bg-white dark:bg-[#323232] rounded-2xl shadow-2xl w-full max-w-md" onClick={e => e.stopPropagation()}>
                      <div className="flex items-center justify-between px-6 py-4 border-b dark:border-gray-700">
                        <h3 className="font-bold text-lg">{modal === 'create' ? 'New Collection' : 'Edit Collection'}</h3>
                        <button onClick={() => setModal(null)} className="p-2 hover:bg-gray-100 dark:hover:bg-[#3a3a3a] rounded-lg">
                          <X size={18} />
                        </button>
                      </div>
                      <div className="px-6 py-5 space-y-4">
                        {/* Icon */}
                        <div>
                          <label className="block text-xs font-semibold mb-1.5 text-gray-600 dark:text-gray-400">Icon (emoji)</label>
                          <input type="text" value={formData.icon} onChange={e => setFormData(f=>({...f,icon:e.target.value}))}
                            className="border dark:border-gray-600 rounded-lg px-3 py-2 w-20 text-center text-xl dark:bg-[#3a3a3a] dark:text-white" maxLength={2} placeholder="👗" />
                        </div>
                        {/* Name */}
                        <div>
                          <label className="block text-xs font-semibold mb-1.5 text-gray-600 dark:text-gray-400">Collection Name *</label>
                          <input type="text" value={formData.name} onChange={e => { setFormData(f=>({...f,name:e.target.value})); setFormErrors(er=>({...er,name:undefined})); }}
                            placeholder="e.g. Viral Collection"
                            className={`border rounded-lg px-4 py-2.5 w-full dark:bg-[#3a3a3a] dark:text-white transition ${formErrors.name ? 'border-red-400 focus:ring-red-400' : 'dark:border-gray-600'} focus:outline-none focus:ring-2 focus:ring-purple-400`} />
                          {formErrors.name && (
                            <div className="flex items-center gap-1 mt-1.5 text-red-600 text-xs">
                              <AlertCircle size={12} /> {formErrors.name}
                            </div>
                          )}
                        </div>
                        {/* Description */}
                        <div>
                          <label className="block text-xs font-semibold mb-1.5 text-gray-600 dark:text-gray-400">Description <span className="font-normal text-gray-400">(optional)</span></label>
                          <textarea value={formData.description} onChange={e => setFormData(f=>({...f,description:e.target.value}))}
                            placeholder="Short description of this collection..."
                            rows={3} className="border dark:border-gray-600 rounded-lg px-4 py-2.5 w-full dark:bg-[#3a3a3a] dark:text-white focus:outline-none focus:ring-2 focus:ring-purple-400 resize-none" />
                        </div>
                      </div>
                      <div className="flex gap-3 px-6 pb-5">
                        <button onClick={() => setModal(null)} className="flex-1 border dark:border-gray-600 rounded-lg py-2.5 text-sm font-semibold hover:bg-gray-50 dark:hover:bg-[#3a3a3a] transition">Cancel</button>
                        <button onClick={handleSave} className="flex-1 bg-black dark:bg-white dark:text-black text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-gray-800 dark:hover:bg-gray-100 transition">
                          {modal === 'create' ? 'Create' : 'Save Changes'}
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* ── DELETE CONFIRMATION ── */}
                {deleteTarget && (
                  <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setDeleteTarget(null)}>
                    <div className="bg-white dark:bg-[#323232] rounded-2xl shadow-2xl w-full max-w-sm p-6" onClick={e => e.stopPropagation()}>
                      <div className="flex items-center gap-3 mb-3">
                        <div className="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center">
                          <Trash2 size={18} className="text-red-600" />
                        </div>
                        <h3 className="font-bold text-lg">Delete Collection?</h3>
                      </div>
                      <p className="text-sm text-gray-600 dark:text-gray-400 mb-1">
                        You're about to delete <span className="font-semibold capitalize">"{deleteTarget.name}"</span>.
                      </p>
                      <p className="text-xs text-gray-500 mb-5">
                        This only removes the sidebar entry. Products with collection "{deleteTarget.name}" will not be deleted.
                      </p>
                      <div className="flex gap-3">
                        <button onClick={() => setDeleteTarget(null)} className="flex-1 border dark:border-gray-600 rounded-lg py-2.5 text-sm font-semibold hover:bg-gray-50 dark:hover:bg-[#3a3a3a] transition">Cancel</button>
                        <button onClick={handleDelete} className="flex-1 bg-red-600 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-red-700 transition">Delete</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* ── TOAST ── */}
                {toast && (
                  <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-5 py-3 rounded-full shadow-xl z-50 animate-bounce">
                    {toast}
                  </div>
                )}
              </div>
            );
          };
          return <CatalogAdmin />;
        })()}

        {adminView === 'collection-pages' && <div ref={colPagesRef} style={{minHeight: '800px'}} />}

        {adminView === 'settings' && (
          <div className="space-y-6">
            <div className="border rounded-lg p-6 bg-white dark:bg-[#323232] dark:border-gray-700">
              <h3 className="text-lg font-bold mb-1">Admin Credentials</h3>
              <p className="text-sm text-gray-500 mb-4">Change your admin login email and password.</p>
              <button
                onClick={() => { localStorage.removeItem('adminCreds'); setShowAdminSetup(true); }}
                className="px-4 py-2 bg-black dark:bg-white dark:text-black text-white text-sm rounded-lg font-semibold hover:bg-gray-800 transition"
              >
                Change Admin Password
              </button>
            </div>

                <div className="border-2 rounded-lg p-6 bg-white dark:bg-[#323232] dark:border-gray-700 border-black dark:border-white">
                  <div className="flex items-center gap-3 mb-1">
                    <div className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${isSupabaseConfigured() ? 'bg-green-500' : 'bg-red-500'}`} />
                    <h3 className="text-lg font-bold">Supabase Database</h3>
                  </div>
                  <p className="text-sm text-gray-500 mb-4 ml-5">
                    {isSupabaseConfigured() ? 'Connected — orders and products are syncing to the cloud.' : 'Not connected — data only lives in this browser. Connect Supabase so customer orders reach you.'}
                  </p>
                  {!isSupabaseConfigured() ? (
                    <div className="space-y-3">
                      <input
                        id="sb-url" type="text" placeholder="Supabase Project URL (https://xxxx.supabase.co)"
                        className="border dark:border-gray-600 rounded-lg px-4 py-3 w-full text-sm dark:bg-[#3a3a3a] font-mono"
                        defaultValue={localStorage.getItem('sb_url') || ''}
                      />
                      <input
                        id="sb-key" type="text" placeholder="Supabase anon/public key"
                        className="border dark:border-gray-600 rounded-lg px-4 py-3 w-full text-sm dark:bg-[#3a3a3a] font-mono"
                        defaultValue={localStorage.getItem('sb_key') || ''}
                      />
                      <button
                        onClick={() => {
                          const url = document.getElementById('sb-url').value.trim();
                          const key = document.getElementById('sb-key').value.trim();
                          if (!url || !key) { alert('Please enter both URL and key'); return; }
                          localStorage.setItem('sb_url', url);
                          localStorage.setItem('sb_key', key);
                          alert('Supabase connected! Reloading data...');
                          loadData();
                        }}
                        className="px-5 py-2.5 bg-black dark:bg-white dark:text-black text-white text-sm rounded-lg font-semibold hover:bg-gray-800 transition"
                      >
                        Connect Supabase
                      </button>
                      <p className="text-xs text-gray-400 mt-2">
                        Get these from <strong>supabase.com</strong> → your project → Settings → API
                      </p>
                    </div>
                  ) : (
                    <button
                      onClick={() => { localStorage.removeItem('sb_url'); localStorage.removeItem('sb_key'); window.location.reload(); }}
                      className="px-4 py-2 text-sm border border-red-300 text-red-500 rounded-lg hover:bg-red-50 transition"
                    >
                      Disconnect
                    </button>
                  )}
                </div>
            <div className="border rounded-lg p-6 bg-white dark:bg-[#323232] dark:border-gray-700">
              <h3 className="text-xl font-bold mb-4">Site Settings</h3>
              <div className="grid gap-4">
                <div>
                  <label className="block text-sm font-semibold mb-2">Site Name</label>
                  <input 
                    type="text" 
                    placeholder="Site Name" 
                    className="border dark:border-gray-600 rounded px-4 py-3 w-full dark:bg-[#3a3a3a]" 
                    value={siteSettings.logoText} 
                    onChange={(e) => setSiteSettings({...siteSettings, logoText: e.target.value})} 
                  />
                </div>
                
                <div>
                  <label className="block text-sm font-semibold mb-2">Collaboration / Sub-brand <span className="text-xs font-normal text-gray-400">(optional — shows as "ARTEMIS PRIME × name")</span></label>
                  <input
                    type="text"
                    placeholder="e.g. Nike, Supreme, Local Artist..."
                    value={siteSettings.collabText}
                    onChange={e => setSiteSettings(prev => ({...prev, collabText: e.target.value}))}
                    className="border dark:border-gray-600 rounded-lg px-4 py-3 w-full dark:bg-[#3a3a3a] focus:outline-none focus:ring-2 focus:ring-black"
                  />
                  <p className="text-xs text-gray-400 mt-1">Leave blank to hide. Will appear in smaller text next to your logo.</p>
                </div>

                <div>
                  <label className="block text-sm font-semibold mb-2">Logo Image</label>
                  <DragDropUploader
                    label="Drag logo (square recommended)"
                    onUpload={(url) => { 
                      setLogoPreview(url); 
                      (async () => {
                        try { await window.storage.set('site-logo', url); } catch(e) { console.warn('logo save failed', e); }
                        setSiteSettings(prev => ({...prev, logoImage: url}));
                        setLogoPreview(url);
                      })(); 
                    }}
                    preview={logoPreview && (
                      <div className="flex items-center gap-4 p-3 bg-gray-50 dark:bg-[#3a3a3a] rounded">
                        <img src={logoPreview} alt="" className="w-12 h-12 rounded-full object-cover" />

              <button
                onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')}
                className="text-sm text-gray-500 hover:text-black dark:hover:text-white w-full text-center"
              >
                {authMode === 'login' ? "Don't have an account? Sign up" : "Already have an account? Login"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ArtemisPrime)
);

  </script>
</body>
</html>
